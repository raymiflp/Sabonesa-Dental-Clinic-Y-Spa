# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Node 22 (ESM) + Express 4 + Prisma 6 (PostgreSQL) backend;
  React 19 + Vite 8 + Tailwind CSS v4 + shadcn/ui (base-nova) + React Router v7 frontend.
  Architecture: REST API (port 3001) + SPA. Backend follows routes → controllers → services pattern.
  Frontend uses react-router-dom v7 for page routing, custom fetch-based api.js client, context for auth.
  DB: PostgreSQL via Prisma with 11 models: Paciente, HistorialClinico, Cita, Crediticio,
  CategoriaProcedimiento, Procedimiento, Presupuesto, Usuario, Insumo, Configuracion, Recordatorio.
  WhatsApp: Baileys library with cron-based reminders. File uploads: Cloudinary.
  Auth: JWT with bcryptjs. Security: Helmet, express-rate-limit, CORS.
  monorepo: backend/ (ESM, Node --watch), frontend/ (Vite 8, HMR).

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "cd frontend && npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: false
  runner: null
  layers:
    unit: { available: false, tool: null }
    integration: { available: false, tool: null }
    e2e: { available: false, tool: null }
  coverage:
    available: false
    command: null
  quality:
    linter: { available: true, command: "cd frontend && eslint .", scope: frontend }
    type_checker: { available: false, command: null }
    formatter: { available: false, command: null }

detected: 2026-06-08
